on:
  push:
    tags:
      - '2.5.0-*' # package-native prerelease tags still use the 2.5 distribution keys
  workflow_dispatch: # allow manual triggering from GitHub page

jobs:
  distribute-linux:
    # The secrets created by `./dk0 prepare-version --ci github VERSION`
    # are tied to this environment only.
    environment: dk-distribution

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            distscript: dist-Linux_x86.u
            image: quay.io/pypa/manylinux_2_28_x86_64:2026.04.08-5
            execution-abi: Linux_x86_64
            target-abi: Linux_x86
          - runs-on: ubuntu-latest
            distscript: dist-Linux_x86_64.u
            image: quay.io/pypa/manylinux_2_28_x86_64:2026.04.08-5
            execution-abi: Linux_x86_64
            target-abi: Linux_x86_64
          # Temporarily disable Linux arm64: dk-distribute@v2 downloads dk0 from
          # diskuv/dk V2_5, whose bootstrap script only supports darwin_arm64,
          # darwin_x86_64, linux_x86_64 and linux_x86 and fails on arm runners
          # with "FATAL: There is no support for linux_arm64". Re-enable after
          # upstream dk0/dk-distribute gains documented Linux arm64 host support.
          # - runs-on: ubuntu-24.04-arm
          #   distscript: dist-Linux_arm64.u
          #   image: quay.io/pypa/manylinux_2_28_aarch64:2026.04.08-5
          #   execution-abi: Linux_arm64
          #   target-abi: Linux_arm64

    runs-on: ${{ matrix.runs-on }}
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Harden Runner # Optional but recommended
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with: { egress-policy: audit }
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare Linux_x86 multilib toolchain
        if: ${{ matrix.distscript == 'dist-Linux_x86.u' }}
        run: dnf install -y glibc-devel.i686 libgcc.i686 libstdc++.i686 gcc-toolset-14-libstdc++-devel.i686

      - name: Compute distribution id
        id: dk_id
        shell: bash
        run: |
          ref_name='${{ github.ref_name }}'

          if [ "${{ github.ref_type }}" = "tag" ]; then
            case "$ref_name" in
              2.5.0-*) dk_version="2.5.${ref_name#2.5.0-}" ;;
              2.5.*) dk_version="$ref_name" ;;
              *)
                echo "::error title=⛔ error hint::Unsupported tag '$ref_name'. Use a package-native prerelease tag like 2.5.0-20260526195500."
                exit 1
                ;;
            esac
          else
            dk_version="2.5.${{ github.run_id }}"
          fi

          echo "value=NotMatveevKondratyev_Libinotify@${dk_version}" >> "$GITHUB_OUTPUT"

      - name: Distribute Modules
        uses: diskuv/dk-distribute@v2
        with:
          id: ${{ steps.dk_id.outputs.value }}
          pubkey: ${{ secrets.distribute_2_5_pubkey }}
          seckey: ${{ secrets.distribute_2_5_seckey }}
          options: -nosysinc
          use-cache: true
          distscript: ${{ matrix.distscript }}
          execution-abi: ${{ matrix.execution-abi }}
          target-abi: ${{ matrix.target-abi }}
          experimental-dk-owner: ${{ github.repository_owner == 'dkpkg' && 'diskuv' || github.repository_owner }}
          experimental-mlfront-ref: ${{ github.ref_type != 'tag' && 'HEAD' }}

  distribute-darwin:
    environment: dk-distribution

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            distscript: dist-Darwin_arm64.u
            execution-abi: Darwin_arm64
          - runs-on: macos-latest
            distscript: dist-Darwin_x86_64.u
            execution-abi: Darwin_arm64
            target-abi: Darwin_x86_64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Harden Runner # Optional but recommended
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with: { egress-policy: audit }
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute distribution id
        id: dk_id
        shell: bash
        run: |
          ref_name='${{ github.ref_name }}'

          if [ "${{ github.ref_type }}" = "tag" ]; then
            case "$ref_name" in
              2.5.0-*) dk_version="2.5.${ref_name#2.5.0-}" ;;
              2.5.*) dk_version="$ref_name" ;;
              *)
                echo "::error title=⛔ error hint::Unsupported tag '$ref_name'. Use a package-native prerelease tag like 2.5.0-20260526195500."
                exit 1
                ;;
            esac
          else
            dk_version="2.5.${{ github.run_id }}"
          fi

          echo "value=NotMatveevKondratyev_Libinotify@${dk_version}" >> "$GITHUB_OUTPUT"

      - name: Distribute Modules
        uses: diskuv/dk-distribute@v2
        with:
          id: ${{ steps.dk_id.outputs.value }}
          pubkey: ${{ secrets.distribute_2_5_pubkey }}
          seckey: ${{ secrets.distribute_2_5_seckey }}
          options: -nosysinc
          use-cache: true
          distscript: ${{ matrix.distscript }}
          execution-abi: ${{ matrix.execution-abi }}
          target-abi: ${{ matrix.target-abi }}
          experimental-dk-owner: ${{ github.repository_owner == 'dkpkg' && 'diskuv' || github.repository_owner }}
          experimental-mlfront-ref: ${{ github.ref_type != 'tag' && 'HEAD' }}

  combine:
    needs:
      - distribute-linux
      - distribute-darwin
    permissions:
      contents: write # for action-gh-release
      id-token: write # for actions/attest-build-provenance
      attestations: write # for actions/attest-build-provenance
      artifact-metadata: write # for actions/attest-build-provenance

    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner # Optional but recommended
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with: { egress-policy: audit }
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Combine Modules
        uses: diskuv/dk-distribute/combine@v2

      - name: Attest
        id: attest
        uses: actions/attest-build-provenance@v3
        with: { subject-path: dk-dist/* }

      - name: Release ${{ github.job }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1. Mar 15, 2026
        with: { files: dk-dist/*, body_path: '.dist-CHANGELOG.txt' }
